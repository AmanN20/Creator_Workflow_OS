# Server
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/creator_workflow_os?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=c3VwZXJTZWNyZXRLZXlGb3JDcmVhdG9yV29ya2Zsb3dPUzIwMjRUaGlzSXNBdExlYXN0MjU2Qml0c0xvbmc=
app.jwt.expiration-ms=86400000

# AI API Configuration (OpenAI-compatible)
app.ai.api-url=https://api.openai.com/v1/chat/completions
app.ai.api-key=YOUR_OPENAI_API_KEY
app.ai.model=gpt-3.5-turbo

# CORS
app.cors.allowed-origins=http://localhost:5173
